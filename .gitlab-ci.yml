# ==========================================
# GitLab CI/CD — минимальный рабочий шаблон
# С ОТКЛЮЧЕНИЕМ SHARED RUNNERS
# ==========================================

# ГЛОБАЛЬНЫЕ НАСТРОЙКИ (уровень корня документа)
# Эти настройки применяются ко всему проекту
variables:
  PIP_CACHE_DIR: ".pip-cache"
  DOCKER_DRIVER: overlay2

# Определяем стадии (порядок выполнения)
stages:
  - lint
  - test
  - build

# Глобальные настройки для всех jobs (image, cache)
default:
  image: python:3.12-slim
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .pip-cache/
    policy: pull-push

# ==========================================
# JOB 1: Lint
# ==========================================
lint:
  stage: lint
  tags: [docker]  # ← КРИТИЧНО: только раннеры с этим тегом возьмут job
  before_script:
    - pip install --cache-dir .pip-cache black flake8
  script:
    - black --check --diff .
    - flake8 . --select=E9,F63,F7,F82 --show-source --statistics
  allow_failure: true
  rules:
    - when: always

# ==========================================
# JOB 2: Test
# ==========================================
test:
  stage: test
  tags: [docker]  # ← КРИТИЧНО
  before_script:
    - pip install --cache-dir .pip-cache -r requirements.txt pytest httpx
  script:
    - pytest tests/ --junitxml=pytest-report.xml -v
  artifacts:
    when: always
    paths:
      - pytest-report.xml
    reports:
      junit: pytest-report.xml
    expire_in: 7 days
  rules:
    - when: always

# ==========================================
# JOB 3: Build
# ==========================================
build:
  stage: build
  tags: [docker]  # ← КРИТИЧНО
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY:latest" .
    - docker push "$CI_REGISTRY:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY:latest"
  needs: ["lint", "test"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG
