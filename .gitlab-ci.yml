# ==========================================
# ГЛОБАЛЬНЫЕ НАСТРОЙКИ
# ==========================================

# workflow: определяет, когда вообще создавать pipeline
# (в GitLab 16+ это стандарт, чтобы не запускать pipeline для draft-MR или force-push)
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# stages: порядок выполнения фаз
stages:
  - lint
  - test
  - build

# default: применяется ко всем jobs, если не переопределено локально
default:
  image: python:3.12-slim
  # Кэш pip: ускоряет установку зависимостей между job
  cache:
    key: "$CI_COMMIT_REF_SLUG"  # отдельный кэш на ветку
    paths:
      - .pip-cache/
    policy: pull-push

# ==========================================
# JOB 1: LINT (статический анализ)
# ==========================================
lint:
  stage: lint
  before_script:
    - pip install --cache-dir .pip-cache black flake8
  script:
    - black --check --diff .
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  # allow_failure: job может упасть, но pipeline не помечается failed
  allow_failure: true
  rules:
    - when: always  # запускать всегда

# ==========================================
# JOB 2: TEST (юнит-тесты)
# ==========================================
test:
  stage: test
  before_script:
    - pip install --cache-dir .pip-cache -r requirements.txt pytest httpx
  script:
    - pytest tests/ --junitxml=pytest-report.xml -v
  artifacts:
    when: always
    paths:
      - pytest-report.xml
    reports:
      junit: pytest-report.xml  # GitLab распарсит и покажет вкладку "Tests"
    expire_in: 7 days
  rules:
    - when: always

# ==========================================
# JOB 3: BUILD (сборка Docker-образа)
# ==========================================
build:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind  # Docker-in-Docker для сборки внутри job
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""  # отключаем TLS для CI (упрощает, в проде настраивается)
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # Собираем образ с тегом короткого хеша коммита и latest
    - docker build -t "$CI_REGISTRY:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY:latest" .
    - docker push "$CI_REGISTRY:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY:latest"
  needs: ["lint", "test"]  # запускаем только после успешных lint и test
  tags:
    - docker  # привязка к нашему runner
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG
