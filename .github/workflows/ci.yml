# ==========================================
# GitHub Actions: CI/CD Pipeline for Order Processing API
# ==========================================

name: CI/CD Pipeline

  # Когда запускать пайплайн
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

      # Глобальные переменные (доступны во всех job)
    env:
      REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    PYTHON_VERSION: '3.12'

      # Jobs выполняются параллельно, если нет зависимостей (needs)
    jobs:
      # ==========================================
      # JOB 1: LINT (Статический анализ кода)
      # ==========================================
      lint:
        name: Code Quality
    runs-on: ubuntu-24.04  # GitHub-hosted runner (чистый, быстрый, бесплатный)

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

          # 2. Настраиваем Python + автоматический кэш pip
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  # GitHub автоматически кэширует ~/.cache/pip

            # 3. Устанавливаем линтеры
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

          # 4. Запускаем проверки
      - name: Check formatting (black)
        run: black --check --diff .

      - name: Check style (flake8)
        run: flake8 . --select=E9,F63,F7,F82 --show-source --statistics

          # ==========================================
          # JOB 2: TEST (Юнит-тесты с БД и очередью)
          # ==========================================
        test:
          name: Run Tests
        runs-on: ubuntu-24.04
        needs: lint  # Ждём успешного lint перед запуском

          # Сервис-контейнеры для тестов (аналог docker-compose services)
        services:
          postgres:
            image: postgres:16-alpine
        env:
          POSTGRES_DB: test_orders
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

        redis:
          image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

        steps:
          - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

          # Запускаем тесты. Переменные окружения передаются явно.
      - name: Run pytest with coverage
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: test_orders
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
        run: |
          pytest tests/ \
          --cov=main \
          --cov-report=xml \
          --cov-report=term \
          --junitxml=pytest-report.xml \
          -v

          # Сохраняем отчёт для вкладки "Actions → Artifacts"
      - name: Upload test results
        if: always()  # Загрузить даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pytest-report.xml
          retention-days: 7

# ==========================================
# JOB 3: BUILD & PUSH (исправленная версия)
# ==========================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 🔥 НОВЫЙ ШАГ: Настраиваем buildx с правильным драйвером
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host  # Для совместимости с GitHub-hosted runners
      
      # Авторизация в GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Мета-теги
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      # Сборка и пуш (теперь без driver:, он настроен выше)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
